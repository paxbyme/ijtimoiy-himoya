server.port=${PORT:8080}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash
gemini.ocr.model=gemini-2.5-flash
gemini.embedding.model=text-embedding-004
pinecone.api.key=${PINECONE_API_KEY:}
pinecone.index.url=${PINECONE_INDEX_URL:}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=-1
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
