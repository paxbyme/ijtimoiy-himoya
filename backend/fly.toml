# fly.toml app configuration file generated for manager-backend on 2026-04-05T00:14:23+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'manager-backend'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
